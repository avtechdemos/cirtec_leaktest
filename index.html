<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leak Test Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@4.1.0/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0b0b0f;
  --surface: #151519;
  --surface-alt: #1c1c22;
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --text: #e4e4e7;
  --text-muted: #a1a1aa;
  --text-dim: #71717a;
  --accent: #22d3ee;
  --accent-dim: rgba(34, 211, 238, 0.15);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.12);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251, 191, 36, 0.12);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  padding: 32px 24px 64px;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}

.header .subtitle {
  color: var(--text-muted);
  font-size: 0.875rem;
  margin-top: 4px;
  font-weight: 400;
}

.header-meta {
  text-align: right;
  font-size: 0.8rem;
  color: var(--text-dim);
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 500;
  background: var(--accent-dim);
  color: var(--accent);
  margin-top: 6px;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  transition: border-color 0.2s ease;
}

.card:hover {
  border-color: var(--border-hover);
}

.card-title {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Executive Summary */
.summary-card {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
  border-left: 3px solid var(--accent);
}

.summary-text {
  font-size: 0.95rem;
  line-height: 1.8;
  color: var(--text-muted);
}

.summary-text strong {
  color: var(--text);
  font-weight: 600;
}

.summary-text .highlight-good {
  color: var(--green);
  font-weight: 600;
}

.summary-text .highlight-bad {
  color: var(--red);
  font-weight: 600;
}

.summary-text .highlight-warn {
  color: var(--amber);
  font-weight: 600;
}

/* KPI Grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  transition: border-color 0.2s ease, transform 0.15s ease;
}

.kpi:hover {
  border-color: var(--border-hover);
  transform: translateY(-1px);
}

.kpi-value {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.kpi-label {
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
}

.kpi-value.accent { color: var(--accent); }
.kpi-value.green { color: var(--green); }
.kpi-value.red { color: var(--red); }
.kpi-value.amber { color: var(--amber); }

/* Charts */
.chart-stack {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 20px;
}

.chart-container {
  position: relative;
  height: 400px;
}

/* Filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.filter-bar .label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-dim);
  margin-right: 4px;
}

.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}

.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.filter-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* Table */
.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

th, td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

th {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  background: var(--surface-alt);
}

td {
  color: var(--text-muted);
}

tr:hover td {
  background: var(--surface-alt);
}

.td-pass { color: var(--green); font-weight: 600; }
.td-fail { color: var(--red); font-weight: 600; }
.td-abort { color: var(--amber); font-weight: 600; }

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 0.78rem;
  color: var(--text-dim);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 0.85rem;
  color: var(--text-dim);
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading test data...</div>
  </div>
</div>

<script>
(async function() {
  const app = document.getElementById('app');

  let DATA;
  try {
    const res = await fetch('./data.json');
    DATA = await res.json();
  } catch(e) {
    app.innerHTML = '<p style="color:var(--red);text-align:center;margin-top:40vh;">Failed to load data.json</p>';
    return;
  }

  // Compute stats
  const total = DATA.length;
  const pass = DATA.filter(d => d.result === 'Pass');
  const fail = DATA.filter(d => d.result === 'Fail');
  const abort = DATA.filter(d => d.result === 'Abort');
  const passRate = total ? pass.length / total : 0;

  const passLR = pass.map(d => d.leakRate).filter(v => v != null);
  const mean = arr => arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : 0;
  const stddev = arr => { const m = mean(arr); return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length); };
  const median = arr => {
    if (!arr.length) return 0;
    const s = [...arr].sort((a, b) => a - b);
    const mid = Math.floor(s.length / 2);
    return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
  };
  const pct = (arr, p) => {
    if (!arr.length) return 0;
    const s = [...arr].sort((a, b) => a - b);
    return s[Math.max(0, Math.ceil(s.length * p / 100) - 1)];
  };

  const meanLR = mean(passLR);
  const stdLR = stddev(passLR);
  const medianLR = median(passLR);
  const maxPassLR = passLR.length ? Math.max(...passLR) : 0;
  const minPassLR = passLR.length ? Math.min(...passLR) : 0;
  const p95LR = pct(passLR, 95);
  const p99LR = pct(passLR, 99);

  // Days
  const daySet = [...new Set(DATA.map(d => d.dt.substring(0, 10)))].sort();
  const dayLabels = daySet.map(d => {
    const parts = d.split('-');
    return `Jun ${parseInt(parts[2])}`;
  });

  // Per-day stats
  const dailyStats = daySet.map(day => {
    const dayData = DATA.filter(d => d.dt.startsWith(day));
    const dayPass = dayData.filter(d => d.result === 'Pass');
    const dayFail = dayData.filter(d => d.result === 'Fail');
    const dayAbort = dayData.filter(d => d.result === 'Abort');
    const dayGross = dayFail.filter(d => d.failReason === 'Gross');
    const dayLimit = dayFail.filter(d => d.failReason === 'Limit 2');
    const times = dayData.map(d => new Date(d.dt).getTime());
    const hours = times.length > 1 ? (Math.max(...times) - Math.min(...times)) / 3600000 : 0;
    const tph = hours > 0 ? (dayData.length / hours).toFixed(1) : '--';
    return {
      day, label: `Jun ${parseInt(day.split('-')[2])}`,
      total: dayData.length, pass: dayPass.length, fail: dayFail.length,
      abort: dayAbort.length, gross: dayGross.length, limit: dayLimit.length,
      rate: dayData.length ? dayPass.length / dayData.length : 0,
      tph
    };
  });

  // Failure analysis
  const grossFails = fail.filter(d => d.failReason === 'Gross');
  const limitFails = fail.filter(d => d.failReason === 'Limit 2');

  // Fill/test pressure stats
  const allFP = DATA.map(d => d.fillPressure).filter(v => v != null);
  const passFP = pass.map(d => d.fillPressure).filter(v => v != null);
  const passTP = pass.map(d => d.testPressure).filter(v => v != null);
  const meanFP = mean(passFP);
  const meanTP = mean(passTP);

  // Date range
  const firstDT = DATA[0].dt.replace('T', ' ');
  const lastDT = DATA[DATA.length - 1].dt.replace('T', ' ');

  // Build summary text
  const summaryHTML = buildSummary();
  function buildSummary() {
    const rateStr = (passRate * 100).toFixed(1);
    const rateClass = passRate >= 0.98 ? 'highlight-good' : passRate >= 0.95 ? 'highlight-warn' : 'highlight-bad';
    let text = `Over <strong>${total.toLocaleString()} tests</strong> conducted across ${daySet.length} days (${dayLabels[0]}–${dayLabels[dayLabels.length-1]}), `;
    text += `the overall pass rate is <span class="${rateClass}">${rateStr}%</span>. `;

    if (fail.length > 0) {
      text += `There were <span class="highlight-bad">${fail.length} failures</span>`;
      if (grossFails.length > 0 && limitFails.length > 0) {
        text += ` (${grossFails.length} gross leaks, ${limitFails.length} limit exceedances)`;
      } else if (grossFails.length > 0) {
        text += ` (${grossFails.length} gross leaks)`;
      }
      text += ` and <span class="highlight-warn">${abort.length} aborts</span>. `;
    }

    text += `Passing parts show a tight leak rate distribution: mean <strong>${meanLR.toFixed(4)} psig</strong> with std dev ${stdLR.toFixed(4)} psig. `;
    text += `Fill pressure remained stable around <strong>${meanFP.toFixed(2)} psig</strong> for passing tests (target: 8.0 psig). `;

    const worstDay = dailyStats.reduce((w, d) => d.rate < w.rate ? d : w, dailyStats[0]);
    if (worstDay.rate < passRate) {
      text += `${worstDay.label} had the lowest pass rate at <span class="${worstDay.rate >= 0.98 ? 'highlight-warn' : 'highlight-bad'}">${(worstDay.rate * 100).toFixed(1)}%</span>. `;
    }

    return text;
  }

  // Render page
  app.innerHTML = `
    <div class="header">
      <div>
        <h1>Leak Test Report</h1>
        <div class="subtitle">Machine 1066222-003N &middot; Clearlink Program &middot; Channel 1</div>
      </div>
      <div class="header-meta">
        <div>${firstDT} &mdash; ${lastDT}</div>
        <span class="badge">${total.toLocaleString()} tests</span>
      </div>
    </div>

    <div class="card summary-card">
      <div class="card-title">Executive Summary</div>
      <div class="summary-text">${summaryHTML}</div>
    </div>

    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="filter-bar" id="filterBar">
      <span class="label">Filter:</span>
    </div>

    <div class="chart-stack">
      <div class="card">
        <div class="card-title">Leak Rate Over Time</div>
        <div class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>Pass</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>Fail</span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>Abort</span>
        </div>
        <div class="chart-container"><canvas id="chartLeak"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Daily Results</div>
        <div class="chart-container"><canvas id="chartDaily"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Leak Rate Distribution (Passing)</div>
        <div class="chart-container"><canvas id="chartHist"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Fill &amp; Test Pressure</div>
        <div class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Fill Pressure</span>
          <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>Test Pressure</span>
        </div>
        <div class="chart-container"><canvas id="chartPressure"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Per-Day Breakdown</div>
      <div class="table-wrap">
        <table id="dailyTable">
          <thead>
            <tr>
              <th>Day</th><th>Total</th><th>Pass</th><th>Fail</th><th>Abort</th>
              <th>Pass Rate</th><th>Gross Fails</th><th>Limit Fails</th><th>Tests/Hour</th>
            </tr>
          </thead>
          <tbody id="dailyTableBody"></tbody>
        </table>
      </div>
    </div>
  `;

  // KPIs
  const kpiGrid = document.getElementById('kpiGrid');
  const kpis = [
    { value: total.toLocaleString(), label: 'Total Tests', cls: 'accent' },
    { value: (passRate * 100).toFixed(1) + '%', label: 'Pass Rate', cls: passRate >= 0.98 ? 'green' : 'amber' },
    { value: pass.length.toLocaleString(), label: 'Passed', cls: 'green' },
    { value: fail.length, label: 'Failed', cls: 'red' },
    { value: abort.length, label: 'Aborted', cls: 'amber' },
    { value: meanLR.toFixed(4), label: 'Mean Leak (psig)', cls: 'accent' },
    { value: stdLR.toFixed(4), label: 'Std Dev (psig)', cls: '' },
  ];
  kpiGrid.innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-value ${k.cls}">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
    </div>
  `).join('');

  // Filter buttons
  const filterBar = document.getElementById('filterBar');
  let activeDays = new Set(daySet);

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', () => {
    if (activeDays.size === daySet.length) { activeDays.clear(); } else { daySet.forEach(d => activeDays.add(d)); }
    updateFilters();
    renderCharts();
  });
  filterBar.appendChild(allBtn);

  daySet.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.textContent = `Jun ${parseInt(day.split('-')[2])}`;
    btn.dataset.day = day;
    btn.addEventListener('click', () => {
      if (activeDays.has(day)) activeDays.delete(day); else activeDays.add(day);
      updateFilters();
      renderCharts();
    });
    filterBar.appendChild(btn);
  });

  function updateFilters() {
    allBtn.classList.toggle('active', activeDays.size === daySet.length);
    filterBar.querySelectorAll('[data-day]').forEach(b => {
      b.classList.toggle('active', activeDays.has(b.dataset.day));
    });
  }

  // Per-day table
  const tbody = document.getElementById('dailyTableBody');
  tbody.innerHTML = dailyStats.map(d => `
    <tr>
      <td><strong>${d.label}</strong></td>
      <td>${d.total}</td>
      <td class="td-pass">${d.pass}</td>
      <td class="td-fail">${d.fail}</td>
      <td class="td-abort">${d.abort}</td>
      <td style="color: ${d.rate >= 0.98 ? 'var(--green)' : 'var(--amber)'}; font-weight:600">${(d.rate * 100).toFixed(1)}%</td>
      <td>${d.gross}</td>
      <td>${d.limit}</td>
      <td>${d.tph}</td>
    </tr>
  `).join('');

  // Chart defaults
  Chart.defaults.font.family = "'Inter', sans-serif";
  Chart.defaults.color = '#71717a';

  const gridColor = 'rgba(255,255,255,0.04)';
  const tooltipStyle = {
    backgroundColor: '#1c1c22',
    titleColor: '#e4e4e7',
    bodyColor: '#a1a1aa',
    borderColor: 'rgba(255,255,255,0.1)',
    borderWidth: 1,
    cornerRadius: 8,
    padding: 10,
    bodyFont: { size: 12 },
    titleFont: { size: 12, weight: 600 }
  };

  let charts = {};

  function filtered() {
    return DATA.filter(d => activeDays.has(d.dt.substring(0, 10)));
  }

  function renderCharts() {
    renderLeakChart();
    renderDailyChart();
    renderHistChart();
    renderPressureChart();
  }

  function renderLeakChart() {
    if (charts.leak) charts.leak.destroy();
    const d = filtered();
    const p = d.filter(r => r.result === 'Pass');
    const f = d.filter(r => r.result === 'Fail');
    const a = d.filter(r => r.result === 'Abort');

    charts.leak = new Chart(document.getElementById('chartLeak'), {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: 'Pass',
            data: p.map(r => ({ x: new Date(r.dt), y: r.leakRate })),
            backgroundColor: '#4ade80',
            borderColor: '#166534',
            borderWidth: 1,
            pointRadius: 3.5,
            pointHoverRadius: 6,
            order: 3
          },
          {
            label: 'Fail',
            data: f.map(r => ({ x: new Date(r.dt), y: r.leakRate || 0.001 })),
            backgroundColor: '#f87171',
            borderColor: '#7f1d1d',
            borderWidth: 1.5,
            pointRadius: 6,
            pointStyle: 'crossRot',
            pointHoverRadius: 9,
            order: 1
          },
          {
            label: 'Abort',
            data: a.filter(r => r.leakRate != null).map(r => ({ x: new Date(r.dt), y: r.leakRate })),
            backgroundColor: '#fbbf24',
            borderColor: '#78350f',
            borderWidth: 1.5,
            pointRadius: 5,
            pointStyle: 'rectRot',
            pointHoverRadius: 8,
            order: 2
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        elements: { point: { hitRadius: 4 } },
        scales: {
          x: {
            type: 'time',
            time: { displayFormats: { hour: 'MMM dd HH:mm', day: 'MMM dd' } },
            grid: { color: gridColor },
            ticks: { maxTicksLimit: 12 }
          },
          y: {
            type: 'logarithmic',
            title: { display: true, text: 'Leak Rate (psig)', color: '#71717a' },
            grid: { color: gridColor }
          }
        },
        plugins: { legend: { display: false }, tooltip: tooltipStyle }
      }
    });
  }

  function renderDailyChart() {
    if (charts.daily) charts.daily.destroy();
    const activeDayList = daySet.filter(d => activeDays.has(d));
    const labels = activeDayList.map(d => `Jun ${parseInt(d.split('-')[2])}`);
    const passC = activeDayList.map(d => DATA.filter(r => r.dt.startsWith(d) && r.result === 'Pass').length);
    const grossC = activeDayList.map(d => DATA.filter(r => r.dt.startsWith(d) && r.result === 'Fail' && r.failReason === 'Gross').length);
    const limitC = activeDayList.map(d => DATA.filter(r => r.dt.startsWith(d) && r.result === 'Fail' && r.failReason === 'Limit 2').length);
    const abortC = activeDayList.map(d => DATA.filter(r => r.dt.startsWith(d) && r.result === 'Abort').length);

    charts.daily = new Chart(document.getElementById('chartDaily'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Pass', data: passC, backgroundColor: 'rgba(74, 222, 128, 0.75)', borderRadius: 4 },
          { label: 'Gross Fail', data: grossC, backgroundColor: 'rgba(248, 113, 113, 0.75)', borderRadius: 4 },
          { label: 'Limit Fail', data: limitC, backgroundColor: 'rgba(251, 146, 60, 0.75)', borderRadius: 4 },
          { label: 'Abort', data: abortC, backgroundColor: 'rgba(251, 191, 36, 0.75)', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        scales: {
          x: { stacked: true, grid: { color: gridColor }, ticks: { font: { weight: 500 } } },
          y: { stacked: true, grid: { color: gridColor }, title: { display: true, text: 'Count', color: '#71717a' } }
        },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true, padding: 16, boxWidth: 8 } },
          tooltip: tooltipStyle
        }
      }
    });
  }

  function renderHistChart() {
    if (charts.hist) charts.hist.destroy();
    const d = filtered();
    const lr = d.filter(r => r.result === 'Pass').map(r => r.leakRate).filter(v => v != null && v < 0.1);

    const binSize = 0.001;
    const maxBin = 0.02;
    const binCount = Math.ceil(maxBin / binSize);
    const bins = new Array(binCount).fill(0);
    const labels = [];
    for (let i = 0; i < binCount; i++) {
      labels.push((i * binSize * 1000).toFixed(1));
      lr.forEach(v => { if (v >= i * binSize && v < (i + 1) * binSize) bins[i]++; });
    }

    charts.hist = new Chart(document.getElementById('chartHist'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Count',
          data: bins,
          backgroundColor: 'rgba(34, 211, 238, 0.5)',
          borderColor: 'rgba(34, 211, 238, 0.8)',
          borderWidth: 1,
          borderRadius: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        scales: {
          x: {
            title: { display: true, text: 'Leak Rate (x10\u207B\u00B3 psig)', color: '#71717a' },
            grid: { color: gridColor },
            ticks: { maxTicksLimit: 12 }
          },
          y: {
            title: { display: true, text: 'Count', color: '#71717a' },
            grid: { color: gridColor }
          }
        },
        plugins: { legend: { display: false }, tooltip: tooltipStyle }
      }
    });
  }

  function renderPressureChart() {
    if (charts.pressure) charts.pressure.destroy();
    const d = filtered();
    const passD = d.filter(r => r.result === 'Pass');
    const failD = d.filter(r => r.result !== 'Pass');

    charts.pressure = new Chart(document.getElementById('chartPressure'), {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: 'Fill Pressure (Pass)',
            data: passD.map(r => ({ x: new Date(r.dt), y: r.fillPressure })),
            backgroundColor: '#22d3ee',
            borderColor: '#0e7490',
            borderWidth: 1,
            pointRadius: 3,
            pointHoverRadius: 5,
            order: 2
          },
          {
            label: 'Test Pressure (Pass)',
            data: passD.map(r => ({ x: new Date(r.dt), y: r.testPressure })),
            backgroundColor: '#a78bfa',
            borderColor: '#5b21b6',
            borderWidth: 1,
            pointRadius: 3,
            pointHoverRadius: 5,
            order: 3
          },
          {
            label: 'Fill Pressure (Fail/Abort)',
            data: failD.map(r => ({ x: new Date(r.dt), y: r.fillPressure })),
            backgroundColor: '#f87171',
            borderColor: '#7f1d1d',
            borderWidth: 1.5,
            pointRadius: 5,
            pointStyle: 'crossRot',
            pointHoverRadius: 7,
            order: 1
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        elements: { point: { hitRadius: 4 } },
        scales: {
          x: {
            type: 'time',
            time: { displayFormats: { hour: 'MMM dd HH:mm', day: 'MMM dd' } },
            grid: { color: gridColor },
            ticks: { maxTicksLimit: 12 }
          },
          y: {
            title: { display: true, text: 'Pressure (psig)', color: '#71717a' },
            grid: { color: gridColor }
          }
        },
        plugins: { legend: { display: false }, tooltip: tooltipStyle }
      }
    });
  }

  renderCharts();
})();
</script>
</body>
</html>
